<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN UP
    </title>
    <style>
        body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-image:url(img6.jpg) ;
      background-size: cover;
            background:linear-gradient(rgba(0,0,0,0,8)),rgb(0,0,0,0,8),url('img3.jpg');
            background-position: center;background-repeat: no-repeat;background-size: cover;
            
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #1f2937;
}

.page {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.card {
    background: white;
    padding: 32px;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 400px;
}

h1 {
    margin: 0 0 8px;
    font-size: 28px;
    text-align: center;
}

p {
    margin: 0 0 20px;
    text-align: center;
    color: #6b7280;
}

form {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.field {
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 6px;
    font-weight: 600;
    color: #374151;
}

input {
    padding: 12px 14px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s ease;
}

input:focus {
    border-color: #4f46e5;
}

button {
    margin-top: 8px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #4f46e5;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s ease;
}

button:hover {
    background: brown;
}


    </style>
</head>
<body>
    <center>
        <div class="page">
        <div class="card">
            <h1>Create Account</h1>
            <p>Sign up to get started with your new account.</p>

            <form>
                <div class="field">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name">
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password">
                </div>

                <button type="submit">Sign Up</button>
            </form>


    </center>
    
</body>
</html>
